<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <div class="card">
    <div class="card-item">卡片1</div>
    <div class="card-item">卡片2</div>
  </div>

  <style>
    .card {
      display: flex;
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
    }

    .card-item {
      font-size: 20px;
    }

    .card>:first-child {
      width: 100%;
      height: auto;
      color: #FF0000;
      background-color: #00FF00;
      order: 1;
      animation: first 10s linear infinite;
    }

    .card>:last-child {
      color: #00FF00;
      background-color: #FF0000;
      width: 100%;
      height: auto;
      order: 2;
      animation: last 10s linear infinite 5s;
    }

    @keyframes first {
      0% {
        order: 1;
        /* width: 100%; */
        transform: translateX(100vw);
      }

      100% {
        order: 1;
        /* width: 100%; */
        transform: translateX(-100vw);
      }
    }

    @keyframes last {
      0% {
        order: 2;
        /* width: 0px; */
        transform: translateX(100vw);
      }

      100% {
        order: 2;
        /* width: 100%; */
        transform: translateX(-100vw);
      }
    }
  </style>
</body>

</html>
